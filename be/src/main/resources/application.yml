spring:
  application:
    name: student-meal-combo
  
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studentmeal_db}}}
    username: ${DB_USER:studentmeal_user}
    password: ${DB_PASSWORD:studentmeal_pass_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-min-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}

# Google OAuth2
google:
  client-id: ${GOOGLE_CLIENT_ID:454394650060-lncbuq81mc2r40r590v61s2k17c0n1t8.apps.googleusercontent.com}
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:AIzaSyCvgm7d92-ePq9xLkRC7ELi2i0E9WT2qFk}

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
  api-key: ${CLOUDINARY_API_KEY:your_api_key}
  api-secret: ${CLOUDINARY_API_SECRET:your_api_secret}


# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Logging
logging:
  level:
    com.studentmeal: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# PayOS (local dev defaults; override via environment variables)
payos:
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  # PayOS vn payment-requests uses api-merchant.payos.vn
  base-url: ${PAYOS_BASE_URL:https://api-merchant.payos.vn}
  # Redirect target for PayOS → your frontend pages.
  # Defaults to your deployed FE URL, but you can override for local testing with:
  # - FRONTEND_BASE_URL=http://localhost:5173
  #   OR
  # - PAYOS_RETURN_URL=... / PAYOS_CANCEL_URL=...
  return-url: ${PAYOS_RETURN_URL:${FRONTEND_BASE_URL:https://exe201-budgetbites-2.onrender.com}/payment-success}
  cancel-url: ${PAYOS_CANCEL_URL:${FRONTEND_BASE_URL:https://exe201-budgetbites-2.onrender.com}/payment-cancel}

# return-url: ${PAYOS_RETURN_URL:http://localhost:5173/payment-success}
#cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/payment-cancel}

